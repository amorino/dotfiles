add_newline = false
format = """
$character$directory$git_branch$git_status """

[character]
error_symbol = "[􀇿 ](bold)"
success_symbol = "[􀒆 ](bold)"

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold"
truncate_to_repo = false
truncation_length = 2

[git_branch]
format = " at [$branch(:$remote_branch)]($style)"
style = "bold"
truncation_length = 20

[git_status]
ahead = "(􀄨 ${count})"
behind = "(􀄩 ${count})"
diverged = "(􀄨 ${ahead_count}, 􀄩 ${behind_count})"
format = "[(([,]() $ahead_behind))]($style)"
staged = "􀈸 "
stashed = ""
style = "bold"
untracked = "􀈷 "

[swift]
disabled = true
